title: "Stochastic Adventures"
description: "A blog of statistical wanderings"

remote_theme: pages-themes/slate@v0.2.0
plugins:
  - jekyll-remote-theme

markdown: kramdown

# Enable posts
collections:
  posts:
    output: true

# Where posts live
defaults:
  - scope:
      path: "Posts"
      type: "posts"
    values:
      layout: post

exclude:
  - "*.Rmd"
  - "Posts/*.Rmd"

